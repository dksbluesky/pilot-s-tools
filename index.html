<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pocket METAR Pro - Instructor Edition v2</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --text: #f8fafc; --dim: #94a3b8; --green: #4ade80; --red: #fb7185; --warn: #facc15; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; }
        .container { max-width: 650px; margin: 0 auto; }
        .tabs { display: flex; gap: 4px; margin-bottom: 12px; }
        .tab-btn { flex: 1; padding: 14px; background: #334155; border: none; color: white; border-radius: 8px 8px 0 0; cursor: pointer; opacity: 0.6; font-weight: bold; }
        .tab-btn.active { background: var(--card); border-bottom: 3px solid var(--accent); opacity: 1; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .card { background: var(--card); border-radius: 12px; padding: 16px; margin-bottom: 12px; box-shadow: 0 10px 15px rgba(0,0,0,0.3); }
        .label-sm { font-size: 0.7rem; color: var(--dim); text-transform: uppercase; font-weight: bold; margin-bottom: 8px; display: block; }
        .rwy-id { font-size: 3.5rem; font-weight: 900; line-height: 1; letter-spacing: -2px; }
        .v-line { width: 2px; height: 50px; background: #475569; }
        .raw-text { font-family: 'Consolas', monospace; color: var(--green); font-size: 0.85rem; line-height: 1.4; background: #000; padding: 10px; border-radius: 6px; border-left: 4px solid var(--green); margin-top: 8px; white-space: pre-wrap; word-break: break-all; }
        .compass-wrap { position: relative; width: 260px; height: 260px; margin: 15px auto; border-radius: 50%; background: #1a365d; border: 2px solid #334155; }
        .rwy-bar { position: absolute; top: 50%; left: 50%; width: 160px; height: 20px; background: #111; border: 1.5px solid #fff; transform: translate(-50%, -50%); z-index: 10; display: flex; justify-content: space-between; align-items: center; padding: 0 10px; border-radius: 3px; }
        .rwy-num { display: inline-block; color: white; font-size: 11px; font-weight: bold; font-family: monospace; }
        .wind-ptr { position: absolute; top: 50%; left: 50%; width: 0; height: 0; transform-origin: center center; z-index: 20; transition: transform 0.8s ease; }
        #map { height: 260px; border-radius: 12px; margin-top: 10px; background: #111; border: 1px solid #444; }
        .input-group { display: flex; gap: 8px; margin-bottom: 10px; }
        .input-group input { flex: 1; padding: 12px; background: #334155; color: white; border: none; border-radius: 8px; font-weight: bold; text-transform: uppercase; }
        .input-group button { padding: 0 20px; background: var(--accent); color: #000; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        select, .tas-input { width: 100%; padding: 14px; background: #334155; color: white; border: none; border-radius: 8px; font-size: 1rem; box-sizing: border-box; }
        .calc-row { display: flex; gap: 10px; flex-wrap: wrap; }
        .calc-row .card { flex: 1; min-width: 250px; margin-bottom: 0; }
        .nav-table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        .nav-table td { padding: 10px 5px; border-bottom: 1px solid #334151; }
        .nav-table .val { color: var(--accent); font-weight: bold; font-family: 'Consolas', monospace; }
        .cloud-item { display: flex; justify-content: space-between; background: rgba(56, 189, 248, 0.1); padding: 8px 12px; border-radius: 8px; border-left: 4px solid var(--accent); margin-bottom: 4px; }
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 8px; }
        .info-item { background: rgba(0,0,0,0.2); padding: 10px; border-radius: 8px; border-left: 3px solid #475569; }
        .warn-text { color: var(--red) !important; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }
    </style>
</head>
<body>

<div class="container">
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab(1)">機場資訊</button>
        <button class="tab-btn" onclick="switchTab(2)">航線計算</button>
    </div>

    <div id="tab1" class="tab-content active">
        <div class="card">
            <span class="label-sm">ICAO 手動輸入 / 選取</span>
            <div class="input-group">
                <input type="text" id="icaoInput" placeholder="例如: RCTP" maxlength="4">
                <button onclick="manualUpdate()">查詢</button>
            </div>
            <select id="apSelect" onchange="document.getElementById('icaoInput').value=this.value; update()"></select>
        </div>
        <div class="card"><span class="label-sm">原始電碼 RAW DATA</span><div id="rawView" class="raw-text">正在讀取導航 CSV 數據...</div></div>
        <div class="card">
            <span class="label-sm">預估跑道 EST. RUNWAY</span>
            <div style="display:flex; align-items:center; gap:20px;">
                <div id="estRwy" class="rwy-id">--</div>
                <div class="v-line"></div>
                <div style="font-size: 0.9rem">
                    <div>頂風 Head: <span id="hWind" style="color:var(--green); font-weight:bold">0</span> KT</div>
                    <div>側風 Cross: <span id="cWind" style="color:var(--green); font-weight:bold">0</span> KT</div>
                </div>
            </div>
        </div>
        <div id="map"></div>
        <div class="card"><span class="label-sm">雲層 CLOUDS</span><div id="cloudBox"></div></div>
        <div class="card">
            <span class="label-sm">電碼解譯 DECODER</span>
            <div class="info-grid">
                <div class="info-item"><span class="label-sm" style="margin:0">能見度 VIS</span><div id="visVal" style="font-weight:bold; font-size:1.1rem">--</div></div>
                <div class="info-item"><span class="label-sm" style="margin:0">氣壓 QNH / ALT</span><div id="qnhVal" style="font-weight:bold; font-size:1.1rem">--</div></div>
            </div>
            <div id="rmkBox" style="margin-top:10px; font-size:0.85rem; color:var(--accent); white-space: pre-line;"></div>
        </div>
        <button onclick="transfer()" style="width:100%; padding:18px; background:var(--accent); color:#000; border:none; border-radius:12px; font-weight:bold; cursor:pointer; margin-top:5px; margin-bottom: 20px;">傳送至計算頁面 ➔</button>
    </div>

    <div id="tab2" class="tab-content">
        <div class="card">
            <div style="display:flex; gap:10px; align-items: flex-end;">
                <div style="flex:2">
                    <span class="label-sm">選取跑道</span>
                    <select id="tab2Rwy" onchange="refreshTab2()"></select>
                </div>
                <div style="flex:1">
                    <span class="label-sm">空速 TAS (KT)</span>
                    <input type="number" id="tasInput" class="tas-input" value="90" oninput="refreshTab2()">
                </div>
            </div>
            <div style="display:flex; gap:5px; margin-top:10px;">
                <button id="bL" style="flex:1; padding:10px; border-radius:5px; border:none; cursor:pointer;" onclick="setSide('L')">LEFT Traffic</button>
                <button id="bR" style="flex:1; padding:10px; border-radius:5px; border:none; cursor:pointer;" onclick="setSide('R')">RIGHT Traffic</button>
            </div>
        </div>
        <div class="card" style="text-align:center">
            <div class="compass-wrap">
                <svg width="260" height="260" viewBox="0 0 200 200" id="compSvg"></svg>
                <div id="rwyBar" class="rwy-bar"><span id="n1" class="rwy-num">--</span><span id="n2" class="rwy-num">--</span></div>
                <div id="windPtr" class="wind-ptr"><svg width="24" height="30" viewBox="0 0 24 30" style="position:absolute; top:-125px; left:-12px;"><path d="M12 30 L24 5 L12 12 L0 5 Z" fill="white" /></svg></div>
            </div>
        </div>
        <div class="calc-row">
            <div class="card"><span class="label-sm">航線偏流 WCA (TAS Ref)</span><table style="width:100%; font-size: 0.95rem; border-collapse: collapse;"><tbody id="wcaList"></tbody></table></div>
            <div class="card"><span class="label-sm">導航頻率 NAV DATA</span><table class="nav-table"><tbody id="navDataTable"></tbody></table></div>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const airportDB = {
    "RCTP": { name: "桃園 Taoyuan", lat: 25.0797, lon: 121.2342, rwys: { "05L": {mag:52, true:48.8}, "05R": {mag:52, true:48.8}, "23L": {mag:232, true:228.8}, "23R": {mag:232, true:228.8} } },
    "RCSS": { name: "松山 Songshan", lat: 25.0697, lon: 121.5525, rwys: { "10": {mag:100, true:93.5}, "28": {mag:280, true:273.5} } },
    "RCKH": { name: "高雄 Kaohsiung", lat: 22.5771, lon: 120.3500, rwys: { "09": {mag:87, true:84.2}, "27": {mag:267, true:264.2} } },
    "RCMQ": { name: "台中 Taichung", lat: 24.2582, lon: 120.6203, rwys: { "18": {mag:180, true:175}, "36": {mag:360, true:355} } },
    "RCNN": { name: "台南 Tainan", lat: 22.9507, lon: 120.2058, rwys: { "18R": {mag:180, true:176.5}, "36L": {mag:360, true:356.5} } },
    "RCBS": { name: "金門 Kinmen", lat: 24.4297, lon: 118.3586, rwys: { "06": {mag:60, true:55}, "24": {mag:240, true:235} } },
    "RCQC": { name: "澎湖 Penghu", lat: 23.5681, lon: 119.6281, rwys: { "02": {mag:20, true:16.5}, "20": {mag:200, true:196.5} } },
    "VHHH": { name: "香港 Hong Kong", lat: 22.3089, lon: 113.9145, rwys: { "07L": {mag:73, true:71}, "25R": {mag:253, true:251} } },
    "VMMC": { name: "澳門 Macau", lat: 22.1495, lon: 113.5915, rwys: { "16": {mag:160, true:158}, "34": {mag:340, true:338} } },
    "WSSS": { name: "新加坡 Singapore", lat: 1.3644, lon: 103.9915, rwys: { "02L": {mag:20, true:20}, "20R": {mag:200, true:200} } },
    "RKSI": { name: "首爾仁川 Incheon", lat: 37.4602, lon: 126.4407, rwys: { "15R": {mag:153, true:145}, "33L": {mag:333, true:325} } },
    "RJTT": { name: "東京羽田 Haneda", lat: 35.5494, lon: 139.7798, rwys: { "34L": {mag:337, true:330}, "34R": {mag:337, true:330}, "16L": {mag:157, true:150}, "16R": {mag:157, true:150} } },
    "KJFK": { name: "紐約 JFK", lat: 40.6413, lon: -73.7781, rwys: { "04L": {mag:44, true:57}, "22R": {mag:224, true:237} } },
    "KLAX": { name: "洛杉磯 L.A.", lat: 33.9416, lon: -118.4085, rwys: { "24L": {mag:251, true:263}, "25R": {mag:251, true:263} } }
};

const groups = [
    { label: "🇹🇼 台灣 Taiwan", ids: ["RCTP", "RCSS", "RCKH", "RCMQ", "RCNN", "RCBS", "RCQC"] },
    { label: "🌏 亞太 Asia-Pacific", ids: ["VHHH", "VMMC", "WSSS", "RKSI", "RJTT"] },
    { label: "🇺🇸 歐美 Global", ids: ["KJFK", "KLAX"] }
];

let navDataDB = {}, currentData = null, trafficSide = 'L', map, marker, patternOverlay;

// 輔助解碼邏輯
const decodeMetarLogic = (raw) => {
    const tokens = raw.split(' ');
    const has = (code) => tokens.some(t => t.includes(code));
    let d = [];
    if(has("NOSIG")) d.push("• NOSIG (未來兩小時天氣無顯著變化)");
    if(has("CAVOK")) d.push("• CAVOK (能見度10km+ 且 5000ft以下無雲)");
    if(has("TSRA")) d.push("• TSRA (雷雨伴隨降雨)");
    else if(has("TS")) d.push("• TS (有雷暴)");
    if(has("WS")) d.push("• WS (報名有風切 Wind Shear)");
    if(has("FG")) d.push("• FG (強霧 Visibility < 1km)");
    if(has("BR")) d.push("• BR (薄霧 Visibility 1-5km)");
    if(has("RA")) d.push("• RA (有雨)");
    if(has("DZ")) d.push("• DZ (毛毛雨)");
    if(has("SH")) d.push("• SH (陣雨)");
    if(has("HZ")) d.push("• HZ (霾)");
    return d.length > 0 ? d.join('\n') : "無特殊天氣現象";
};

async function update() {
    const id = document.getElementById('icaoInput').value.toUpperCase(); if (!id) return;
    const ap = airportDB[id] || { name: id, lat: 25.07, lon: 121.23, rwys: {} };
    document.getElementById('rawView').innerText = `Fetching ${id} METAR...`;
    
    try {
        const response = await fetch(`https://metar.vatsim.net/metar.php?id=${id}&t=${Date.now()}`);
        const raw = await response.text(); if(!raw || raw.trim().length === 0) throw new Error("No Data");
        document.getElementById('rawView').innerText = raw.trim();

        // 1. 風向風速解析 (VRB/靜風)
        const wMatch = raw.match(/(VRB|\d{3})(\d{2,3})KT/);
        let dir = 0, spd = 0, isVrb = false;
        if (wMatch) {
            isVrb = wMatch[1] === "VRB";
            dir = isVrb ? 0 : parseInt(wMatch[1]);
            spd = parseInt(wMatch[2]);
        }

        // 2. 氣壓單位兼容 (QNH vs Altimeter)
        const qnhMatch = raw.match(/Q(\d{4})/);
        const altMatch = raw.match(/A(\d{4})/);
        let qnhStr = "--";
        if (qnhMatch) qnhStr = qnhMatch[1] + " hPa";
        else if (altMatch) qnhStr = (parseInt(altMatch[1])/100).toFixed(2) + " inHg";
        document.getElementById('qnhVal').innerText = qnhStr;

        // 3. 能見度與雲層
        const visMatch = raw.match(/\b\d{4}\b/);
        document.getElementById('visVal').innerText = visMatch ? (visMatch[0] === "9999" ? "10km+" : visMatch[0]+"m") : "N/A";
        const cloudRegex = /(FEW|SCT|BKN|OVC)(\d{3})/g;
        let cMatch, cloudsHtml = ""; 
        while ((cMatch = cloudRegex.exec(raw)) !== null) { 
            cloudsHtml += `<div class="cloud-item"><span><b>${cMatch[1]}</b></span><span>${parseInt(cMatch[2])*100} ft</span></div>`; 
        }
        document.getElementById('cloudBox').innerHTML = cloudsHtml || "Sky Clear / NSC";

        // 4. 解碼顯示
        document.getElementById('rmkBox').innerText = decodeMetarLogic(raw);

        // 5. 跑道判定
        let best = "--", minD = 180;
        for(let r in ap.rwys) { 
            let diff = Math.abs(dir - ap.rwys[r].mag); 
            if(diff > 180) diff = 360 - diff; 
            if(diff < minD) { minD = diff; best = r; } 
        }
        
        const rad = (minD * Math.PI) / 180;
        const hw = Math.round(spd * Math.cos(rad));
        const cw = Math.round(spd * Math.sin(rad));
        currentData = { id, dir, spd, best, hw, cw, isVrb };
        
        document.getElementById('estRwy').innerText = isVrb ? "VRB" : best;
        document.getElementById('hWind').innerText = hw;
        const cwEl = document.getElementById('cWind');
        cwEl.innerText = cw;
        cwEl.className = cw > 15 ? "warn-text" : "";

        map.setView([ap.lat, ap.lon], 14); marker.setLatLng([ap.lat, ap.lon]);
        if(best !== "--") drawMapPattern(id, best);
    } catch (e) { document.getElementById('rawView').innerText = `連線異常: ${e.message}`; }
}

function refreshTab2() {
    if(!currentData) return; 
    const r = document.getElementById('tab2Rwy').value, ap = airportDB[currentData.id];
    const tas = parseInt(document.getElementById('tasInput').value) || 90;
    const magH = (ap && ap.rwys[r]) ? ap.rwys[r].mag : parseInt(r)*10;
    
    const rot = magH - 90; document.getElementById('rwyBar').style.transform = `translate(-50%, -50%) rotate(${rot}deg)`;
    const n1 = document.getElementById('n1'), n2 = document.getElementById('n2');
    n1.innerText = r; n2.innerText = (parseInt(r) > 18 ? parseInt(r)-18 : parseInt(r)+18).toString().padStart(2,'0');
    
    document.getElementById('windPtr').style.transform = `translate(-50%, -50%) rotate(${currentData.dir}deg)`;
    
    const legs = [
        {n:"Upwind", t:magH},
        {n:"Cross", t:(magH + (trafficSide==='L'?-90:90) + 360)%360},
        {n:"Downwind", t:(magH+180)%360},
        {n:"Base", t:(magH + (trafficSide==='L'?90:-90) + 360)%360}
    ];

    let h = ""; 
    legs.forEach(l => {
        const a = (currentData.dir - l.t) * Math.PI / 180;
        let wca = Math.round(Math.asin((currentData.spd * Math.sin(a)) / tas) * 180 / Math.PI);
        if(isNaN(wca)) wca = 0; 
        h += `<tr><td style="padding:12px 8px">${l.n}</td><td align="center">${Math.round(l.t)}°</td><td align="center" style="color:var(--red)">${wca>0?'+':''}${wca}°</td><td align="right"><b>${((l.t+wca+360)%360).toString().padStart(3,'0')}°</b></td></tr>`;
    }); 
    document.getElementById('wcaList').innerHTML = h;

    const navTable = document.getElementById('navDataTable');
    const nav = (navDataDB[currentData.id] && navDataDB[currentData.id][r]) ? navDataDB[currentData.id][r] : null;
    if(nav) { navTable.innerHTML = `<tr><td>Ident</td><td align="right" class="val">${nav.ident}</td></tr><tr><td>ILS Freq</td><td align="right" class="val">${nav.ils} MHz</td></tr><tr><td>Course</td><td align="right" class="val">${nav.crs}°</td></tr>`; }
    else { navTable.innerHTML = `<tr><td colspan="2" align="center" style="padding:20px; color:var(--dim)">無導航資料</td></tr>`; }
    if(ap && ap.rwys[r]) drawMapPattern(currentData.id, r);
}

function manualUpdate() { update(); }
function transfer() {
    if(!currentData) return; const s = document.getElementById('tab2Rwy'); s.innerHTML = "";
    const ap = airportDB[currentData.id];
    if(ap && ap.rwys) { for(let r in ap.rwys) { let o = new Option("RWY " + r, r); if(r === currentData.best) o.selected = true; s.add(o); } }
    refreshTab2(); switchTab(2);
}
function setSide(s) { trafficSide = s; document.getElementById('bL').style.background = s === 'L' ? 'var(--accent)' : '#334155'; document.getElementById('bR').style.background = s === 'R' ? 'var(--accent)' : '#334155'; refreshTab2(); }
function switchTab(n) { document.querySelectorAll('.tab-content, .tab-btn').forEach(el => el.classList.remove('active')); document.getElementById('tab' + n).classList.add('active'); document.querySelectorAll('.tab-btn')[n-1].classList.add('active'); if(n === 1) setTimeout(() => map.invalidateSize(), 300); }

// --- 核心併合引擎：修正版 ---
async function ingestOurAirportsData() {
    try {
        const [rRes, nRes] = await Promise.all([fetch('runways.csv'), fetch('navaids.csv')]);
        const rText = await rRes.text(), nText = await nRes.text(), navMap = {};

        // 1. 先處理導航台 (Navaids)
        nText.split('\n').slice(1).forEach(line => {
            const c = parseCSVLine(line); if (c.length < 20) return;
            const type = c[4].replace(/"/g,''), icao = c[19].trim().replace(/"/g,'').toUpperCase();
            if (type.includes('ILS') || type.includes('TACAN') || type.includes('DME')) {
                if (!navMap[icao]) navMap[icao] = [];
                navMap[icao].push({ 
                    type, 
                    ident: c[2].replace(/"/g,''), 
                    name: c[3].replace(/"/g,''), 
                    freq: c[5], 
                    chan: c[11].replace(/"/g,'') 
                });
            }
        });

        // 2. 處理跑道並與導航台配對 (Runways)
        rText.split('\n').slice(1).forEach(line => {
            const c = parseCSVLine(line); if (c.length < 13) return;
            const icao = c[2].replace(/"/g,'').trim().toUpperCase();
            if (!icao) return;
            if (!navDataDB[icao]) navDataDB[icao] = {};

            const navs = navMap[icao] || [];

            // 輔助函數：幫特定跑道號碼找 ILS
            const findILS = (rID) => {
                const rNum = rID.replace(/\D/g,'');
                const ils = navs.find(n => n.type.includes('ILS') && (n.name.includes(rNum) || n.ident.includes(rNum)));
                const tacan = navs.find(n => (n.type.includes('TACAN') || n.type.includes('DME')) && n.chan !== "");
                let fVal = "N/A"; 
                if(ils) { 
                    let f = parseFloat(ils.freq); 
                    fVal = (f > 1000) ? (f/1000).toFixed(2) : f.toFixed(2); 
                }
                return { 
                    ident: ils ? ils.ident : "N/A", 
                    ils: fVal, 
                    tacan: tacan ? tacan.chan : "N/A" 
                };
            };

            // --- 修正重點：同時處理跑道兩頭 ---
            // Low End (例如 05L)
            const leID = c[8].replace(/"/g,'').trim();
            if(leID) {
                const data = findILS(leID);
                navDataDB[icao][leID] = { ...data, crs: c[12] || leID+"0" };
            }

            // High End (例如 23R) - 這是你原本漏掉的
            if(c.length > 14) {
                const heID = c[14].replace(/"/g,'').trim();
                if(heID) {
                    const data = findILS(heID);
                    navDataDB[icao][heID] = { ...data, crs: c[18] || heID+"0" };
                }
            }
        });
        console.log("併合完成！", navDataDB);
        document.getElementById('rawView').innerText = "導航數據庫已就緒。";
    } catch (e) { 
        console.error("CSV Error", e); 
    }
}

function drawMapPattern(id, rwy) {
    const ap = airportDB[id]; if(!ap || !ap.rwys[rwy]) return;
    const s = trafficSide === 'L' ? -1 : 1, tH = ap.rwys[rwy].true;
    const latF = 1 / 60, lonF = latF / Math.cos(ap.lat * Math.PI / 180);
    const toR = Math.PI / 180, rH = (90 - tH) * toR, rS = (90 - (tH + 90 * s)) * toR;
    const m = (p, a, d) => [p[0] + Math.sin(a) * d * latF, p[1] + Math.cos(a) * d * lonF];
    const p1 = m([ap.lat, ap.lon], rH, 1.5), p2 = m([ap.lat, ap.lon], rH, -1.5), p3 = m(p2, rS, 1.2), p4 = m(p1, rS, 1.2);
    patternOverlay.setLatLngs([p1, p2, p3, p4, p1]);
}

function drawCompassUI() {
    const svg = document.getElementById('compSvg'), lbls = { 0:'N', 90:'E', 180:'S', 270:'W' };
    let h = ''; for(let i=0; i<360; i+=10) {
        let isL = i % 30 === 0, x1 = 100 + Math.sin(i*Math.PI/180) * (isL ? 82 : 88), y1 = 100 - Math.cos(i*Math.PI/180) * (isL ? 82 : 88);
        let x2 = 100 + Math.sin(i*Math.PI/180) * 96, y2 = 100 - Math.cos(i*Math.PI/180) * 96;
        h += `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="#94a3b8" stroke-width="${isL?2:1}" />`;
        if(i % 90 === 0) h += `<text x="${100+Math.sin(i*Math.PI/180)*72}" y="${100-Math.cos(i*Math.PI/180)*72}" fill="white" font-size="14" font-weight="bold" text-anchor="middle" alignment-baseline="middle">${lbls[i]}</text>`;
    } svg.innerHTML = h;
}

function init() {
    ingestOurAirportsData();
    const sel = document.getElementById('apSelect');
    groups.forEach(g => {
        let grp = document.createElement('optgroup'); grp.label = g.label;
        g.ids.forEach(id => {
            if(airportDB[id]) grp.appendChild(new Option(`${id} - ${airportDB[id].name}`, id));
        });
        sel.appendChild(grp);
    });
    sel.value = "RCSS"; document.getElementById('icaoInput').value = "RCSS";
    map = L.map('map', { zoomControl: false }).setView([25.0697, 121.5525], 14);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    marker = L.marker([25.0697, 121.5525]).addTo(map);
    patternOverlay = L.polyline([], { color: '#38bdf8', weight: 3, dashArray: '10, 10' }).addTo(map);
    drawCompassUI(); setSide('L'); update();
}
window.onload = init;
</script>
</body>
