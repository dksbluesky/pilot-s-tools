<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pocket METAR Pro - Ultimate Integration</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --text: #f8fafc; --dim: #94a3b8; --green: #4ade80; --red: #fb7185; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; }
        /* 放寬容器以利 Table 並列 */
        .container { max-width: 650px; margin: 0 auto; }
        .tabs { display: flex; gap: 4px; margin-bottom: 12px; }
        .tab-btn { flex: 1; padding: 14px; background: #334155; border: none; color: white; border-radius: 8px 8px 0 0; cursor: pointer; opacity: 0.6; font-weight: bold; }
        .tab-btn.active { background: var(--card); border-bottom: 3px solid var(--accent); opacity: 1; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .card { background: var(--card); border-radius: 12px; padding: 16px; margin-bottom: 12px; box-shadow: 0 10px 15px rgba(0,0,0,0.3); }
        .label-sm { font-size: 0.7rem; color: var(--dim); text-transform: uppercase; font-weight: bold; margin-bottom: 8px; display: block; }
        
        .rwy-id { font-size: 3.5rem; font-weight: 900; line-height: 1; letter-spacing: -2px; }
        .v-line { width: 2px; height: 50px; background: #475569; }
        .raw-text { font-family: 'Consolas', monospace; color: var(--green); font-size: 0.85rem; line-height: 1.4; background: #000; padding: 10px; border-radius: 6px; border-left: 4px solid var(--green); margin-top: 8px; white-space: pre-wrap; word-break: break-all; }

        .compass-wrap { position: relative; width: 260px; height: 260px; margin: 15px auto; border-radius: 50%; background: #1a365d; border: 2px solid #334155; }
        .rwy-bar { position: absolute; top: 50%; left: 50%; width: 160px; height: 20px; background: #111; border: 1.5px solid #fff; transform: translate(-50%, -50%); z-index: 10; display: flex; justify-content: space-between; align-items: center; padding: 0 10px; border-radius: 3px; }
        .rwy-num { display: inline-block; color: white; font-size: 11px; font-weight: bold; font-family: monospace; transition: transform 0.3s; }
        .wind-ptr { position: absolute; top: 50%; left: 50%; width: 0; height: 0; transform-origin: center center; z-index: 20; transition: transform 0.8s ease; }
        
        #map { height: 260px; border-radius: 12px; margin-top: 10px; background: #111; border: 1px solid #444; }
        select { width: 100%; padding: 14px; background: #334155; color: white; border: none; border-radius: 8px; font-size: 1rem; }
        .side-toggle { display: flex; gap: 8px; margin-top: 10px; }
        .side-toggle button { flex: 1; padding: 12px; border-radius: 8px; background: #334155; color: white; font-weight: bold; cursor: pointer; border: none; }
        .side-toggle button.active { background: #f59e0b; color: #000; }

        /* Decoder Style */
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 8px; }
        .info-item { background: rgba(0,0,0,0.2); padding: 10px; border-radius: 8px; border-left: 3px solid #475569; }
        .cloud-item { display: flex; justify-content: space-between; background: rgba(56, 189, 248, 0.1); padding: 8px 12px; border-radius: 8px; border-left: 4px solid var(--accent); margin-bottom: 4px; }

        /* 並列表格容器 */
        .calc-row { display: flex; gap: 10px; flex-wrap: wrap; }
        .calc-row .card { flex: 1; min-width: 250px; margin-bottom: 0; }
        .nav-table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        .nav-table td { padding: 10px 5px; border-bottom: 1px solid #334151; }
        .nav-table .val { color: var(--accent); font-weight: bold; font-family: 'Consolas', monospace; }
    </style>
</head>
<body>

<div class="container">
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab(1)">機場資訊</button>
        <button class="tab-btn" onclick="switchTab(2)">航線計算</button>
    </div>

    <div id="tab1" class="tab-content active">
        <div class="card"><span class="label-sm">ICAO 機場選擇</span><select id="apSelect" onchange="update()"></select></div>
        <div class="card"><span class="label-sm">原始電碼 RAW DATA</span><div id="rawView" class="raw-text">正在連接 VATSIM 伺服器...</div></div>
        
        <div class="card">
            <span class="label-sm">預估跑道 EST. RUNWAY</span>
            <div style="display:flex; align-items:center; gap:20px;">
                <div id="estRwy" class="rwy-id">--</div>
                <div class="v-line"></div>
                <div style="font-size: 0.9rem">
                    <div>頂風 Head: <span id="hWind" style="color:var(--green); font-weight:bold">0</span> KT</div>
                    <div>側風 Cross: <span id="cWind" style="color:var(--green); font-weight:bold">0</span> KT</div>
                </div>
            </div>
        </div>

        <div id="map" class="mb-4"></div>

        <div class="card">
            <span class="label-sm">雲層 CLOUDS</span>
            <div id="cloudBox"></div>
        </div>

        <div class="card">
            <span class="label-sm">電碼解譯 DECODER</span>
            <div class="info-grid">
                <div class="info-item"><span class="label-sm" style="margin:0">能見度 VIS</span><div id="visVal" style="font-weight:bold; font-size:1.1rem">--</div></div>
                <div class="info-item"><span class="label-sm" style="margin:0">氣壓 QNH</span><div id="qnhVal" style="font-weight:bold; font-size:1.1rem">--</div></div>
            </div>
            <div id="rmkBox" style="margin-top:10px; font-size:0.85rem; color:var(--accent)"></div>
        </div>

        <button onclick="transfer()" style="width:100%; padding:18px; background:var(--accent); color:#000; border:none; border-radius:12px; font-weight:bold; cursor:pointer; margin-top:5px; margin-bottom: 20px;">傳送至計算頁面 ➔</button>
    </div>

    <div id="tab2" class="tab-content">
        <div class="card">
            <select id="tab2Rwy" onchange="refreshTab2()" style="margin-bottom:10px"></select>
            <div class="side-toggle"><button id="bL" class="active" onclick="setSide('L')">LEFT Traffic</button><button id="bR" onclick="setSide('R')">RIGHT Traffic</button></div>
        </div>
        <div class="card" style="text-align:center">
            <div class="compass-wrap">
                <svg width="260" height="260" viewBox="0 0 200 200" id="compSvg"></svg>
                <div id="rwyBar" class="rwy-bar"><span id="n1" class="rwy-num">--</span><span id="n2" class="rwy-num">--</span></div>
                <div id="windPtr" class="wind-ptr"><svg width="24" height="30" viewBox="0 0 24 30" style="position:absolute; top:-125px; left:-12px;"><path d="M12 30 L24 5 L12 12 L0 5 Z" fill="white" /></svg></div>
            </div>
        </div>

        <div class="calc-row">
            <div class="card">
                <span class="label-sm">航線偏流 WCA (Table 2)</span>
                <table style="width:100%; font-size: 0.95rem; border-collapse: collapse;"><tbody id="wcaList"></tbody></table>
            </div>
            <div class="card">
                <span class="label-sm">導航頻率 NAV DATA (Table 3)</span>
                <table class="nav-table">
                    <tbody id="navDataTable">
                        </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// 1. 專家資料庫 (維持教官原始設定)
const airportDB = {
    "RCTP": { name: "桃園 Taoyuan", lat: 25.0797, lon: 121.2342, rwys: { "05L": {mag:52, true:48.8}, "05R": {mag:52, true:48.8}, "23L": {mag:232, true:228.8}, "23R": {mag:232, true:228.8} } },
    "RCSS": { name: "松山 Songshan", lat: 25.0697, lon: 121.5525, rwys: { "10": {mag:100, true:93.5}, "28": {mag:280, true:273.5} } },
    "RCKH": { name: "高雄 Kaohsiung", lat: 22.5771, lon: 120.3500, rwys: { "09": {mag:87, true:84.2}, "27": {mag:267, true:264.2} } },
    "RCMQ": { name: "台中 Taichung", lat: 24.2582, lon: 120.6203, rwys: { "18": {mag:180, true:175}, "36": {mag:360, true:355} } },
    "RCNN": { name: "台南 Tainan", lat: 22.9507, lon: 120.2058, rwys: { "18R": {mag:180, true:176.5}, "36L": {mag:360, true:356.5} } },
    "RCBS": { name: "金門 Kinmen", lat: 24.4297, lon: 118.3586, rwys: { "06": {mag:60, true:55}, "24": {mag:240, true:235} } },
    "RCQC": { name: "澎湖 Penghu", lat: 23.5681, lon: 119.6281, rwys: { "02": {mag:20, true:16.5}, "20": {mag:200, true:196.5} } },
    "VHHH": { name: "香港 Hong Kong", lat: 22.3089, lon: 113.9145, rwys: { "07L": {mag:73, true:71}, "25R": {mag:253, true:251} } },
    "VMMC": { name: "澳門 Macau", lat: 22.1495, lon: 113.5915, rwys: { "16": {mag:160, true:158}, "34": {mag:340, true:338} } },
    "WSSS": { name: "新加坡 Singapore", lat: 1.3644, lon: 103.9915, rwys: { "02L": {mag:20, true:20}, "20R": {mag:200, true:200} } },
    "RJTT": { name: "東京羽田 Haneda", lat: 35.5494, lon: 139.7798, rwys: { "34L": {mag:337, true:330}, "16R": {mag:157, true:150} } },
    "KJFK": { name: "紐約 JFK", lat: 40.6413, lon: -73.7781, rwys: { "04L": {mag:44, true:57}, "22R": {mag:224, true:237} } }
};

let navDataDB = {}; // 存放併合後的導航資料

// 2. 併合引擎：根據教官提供的 CSV 截圖索引進行讀取

async function ingestOurAirportsData() {
    try {
        console.log("正在從 GitHub 讀取 CSV...");
        const [rwyRes, navRes] = await Promise.all([
            fetch('runways.csv'),
            fetch('navaids.csv')
        ]);

        if (!rwyRes.ok || !navRes.ok) throw new Error("CSV 檔案未找到");

        const rwyText = await rwyRes.text();
        const navText = await navRes.text();

        // 處理 navaids.csv (建立導航站映射)
        const navMap = {}; 
        navText.split('\n').slice(1).forEach(line => {
            const cols = line.split(',');
            if (cols.length < 20) return;
            const type = cols[4].replace(/"/g, ''); // 類型
            const icao = cols[19].trim().replace(/"/g, ''); // 機場識別碼 (索引19)
            if (type.includes('ILS') || type.includes('TACAN')) {
                if (!navMap[icao]) navMap[icao] = [];
                navMap[icao].push({
                    type: type,
                    ident: cols[2].replace(/"/g, ''), // 識別碼 (索引2)
                    name: cols[3].replace(/"/g, ''),  // 名稱 (索引3)
                    freq: (parseInt(cols[5]) / 1000).toFixed(2), // 頻率 (索引5)
                    chan: cols[11].replace(/"/g, '')  // 頻道 (索引11)
                });
            }
        });

        // 處理 runways.csv 並與設備併合
        rwyText.split('\n').slice(1).forEach(line => {
            const cols = line.split(',');
            if (cols.length < 13) return;
            const icao = cols[2].replace(/"/g, ''); // 機場 (索引2)
            const rwyId = cols[8].replace(/"/g, ''); // 跑道號 (索引8)
            const trueCrs = cols[12].replace(/"/g, ''); // 航向 (索引12)

            if (icao && rwyId) {
                if (!navDataDB[icao]) navDataDB[icao] = {};
                const navs = navMap[icao] || [];
                // 模糊配對跑道號與 ILS 名稱
                const ilsMatch = navs.find(n => n.type.includes('ILS') && n.name.includes(rwyId));
                const tacanMatch = navs.find(n => n.type.includes('TACAN') || n.chan !== "");

                navDataDB[icao][rwyId] = {
                    ident: ilsMatch ? ilsMatch.ident : "N/A",
                    ils: ilsMatch ? ilsMatch.freq : "N/A",
                    crs: trueCrs || rwyId + "0",
                    tacan: tacanMatch ? tacanMatch.chan : "N/A"
                };
            }
        });
        console.log("併合完成！");
    } catch (err) { console.error("CSV 引擎錯誤:", err); }
}

const groups = [
    { label: "🇹🇼 台灣 Taiwan", ids: ["RCTP", "RCSS", "RCKH", "RCMQ", "RCNN", "RCBS", "RCQC"] },
    { label: "🌏 港澳/中國 East Asia", ids: ["VHHH", "VMMC"] },
    { label: "JPKR 日本/韓國 Japan/Korea", ids: ["RJTT"] },
    { label: "🌴 東南亞 SE Asia", ids: ["WSSS"] },
    { label: "USEU 歐美 US/EU", ids: ["KJFK"] }
];

let map, marker, patternOverlay, currentData = null, trafficSide = 'L';

async function update() {
    const id = document.getElementById('apSelect').value;
    const ap = airportDB[id];
    if (!ap) return; 

    document.getElementById('rawView').innerText = `Fetching ${id} METAR...`;

    try {
        const response = await fetch(`https://metar.vatsim.net/metar.php?id=${id}&t=${Date.now()}`);
        const raw = await response.text();
        if(!raw || raw.trim().length === 0) throw new Error("No Data");
        document.getElementById('rawView').innerText = raw.trim();
        
        const wMatch = raw.match(/(\d{3})(\d{2,3})KT/);
        const dir = wMatch ? parseInt(wMatch[1]) : 0;
        const spd = wMatch ? parseInt(wMatch[2]) : 0;

        const visMatch = raw.match(/\b\d{4}\b/);
        document.getElementById('visVal').innerText = visMatch ? (visMatch[0] === "9999" ? "10km+" : visMatch[0]+"m") : "N/A";
        const qnhMatch = raw.match(/Q(\d{4})/);
        document.getElementById('qnhVal').innerText = qnhMatch ? qnhMatch[1]+" hPa" : "N/A";

        const cloudRegex = /(FEW|SCT|BKN|OVC)(\d{3})/g;
        let cMatch, cloudsHtml = "";
        while ((cMatch = cloudRegex.exec(raw)) !== null) {
            cloudsHtml += `<div class="cloud-item"><span><b>${cMatch[1]}</b></span><span>${parseInt(cMatch[2])*100} ft</span></div>`;
        }
        document.getElementById('cloudBox').innerHTML = cloudsHtml || "Sky Clear / NSC";

        let dText = "";
        dText += raw.includes("NOSIG") ? "NOSIG (未來兩小時天氣無顯著變化)\n" : "";
        dText += raw.includes("-RA") ? "-RA (小雨)\n" : raw.includes("+RA") ? "+RA (大雨)\n" : raw.includes("RA") ? "RA (下雨)\n" : "";
        dText += raw.includes("TS") ? "TS (雷雨)\n" : "";
        document.getElementById('rmkBox').innerText = dText || "無特殊天氣現象";

        let best = "", minD = 180;
        for(let r in ap.rwys) {
            let diff = Math.abs(dir - ap.rwys[r].mag); 
            if(diff > 180) diff = 360 - diff;
            if(diff < minD) { minD = diff; best = r; }
        }
        const rad = (minD * Math.PI) / 180;
        currentData = { id, dir, spd, best, hw: Math.round(spd*Math.cos(rad)), cw: Math.round(spd*Math.sin(rad)) };
        
        document.getElementById('estRwy').innerText = best;
        document.getElementById('hWind').innerText = currentData.hw;
        document.getElementById('cWind').innerText = currentData.cw;
        
        map.setView([ap.lat, ap.lon], 14);
        marker.setLatLng([ap.lat, ap.lon]);
        drawMapPattern(id, best);
        
    } catch (e) {
        document.getElementById('rawView').innerText = `連線異常: ${e.message}`;
    }
}

function init() {
    ingestOurAirportsData(); // 啟動 CSV 併合
    const sel = document.getElementById('apSelect');
    groups.forEach(g => {
        let grp = document.createElement('optgroup'); grp.label = g.label;
        g.ids.forEach(id => grp.appendChild(new Option(`${id} - ${airportDB[id].name}`, id)));
        sel.appendChild(grp);
    });
    sel.value = "RCSS";
    map = L.map('map', { zoomControl: false }).setView([25.0697, 121.5525], 14);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    marker = L.marker([25.0697, 121.5525]).addTo(map);
    patternOverlay = L.polyline([], { color: '#38bdf8', weight: 3, dashArray: '10, 10' }).addTo(map);
    drawCompassUI();
    update();
}

function drawMapPattern(id, rwy) {
    const ap = airportDB[id], s = trafficSide === 'L' ? -1 : 1;
    const trueHdg = ap.rwys[rwy].true;
    const latF = 1 / 60, lonF = latF / Math.cos(ap.lat * Math.PI / 180);
    const toRad = Math.PI / 180, rH = (90 - trueHdg) * toRad, rS = (90 - (trueHdg + 90 * s)) * toRad;
    const move = (p, ang, dist) => [p[0] + Math.sin(ang) * dist * latF, p[1] + Math.cos(ang) * dist * lonF];
    const p1 = move([ap.lat, ap.lon], rH, 1.5), p2 = move([ap.lat, ap.lon], rH, -1.5), p3 = move(p2, rS, 1.2), p4 = move(p1, rS, 1.2);
    patternOverlay.setLatLngs([p1, p2, p3, p4, p1]);
}

function drawCompassUI() {
    const svg = document.getElementById('compSvg'), lbls = { 0:'N', 90:'E', 180:'S', 270:'W' };
    let h = '';
    for(let i=0; i<360; i+=10) {
        let isL = i % 30 === 0, x1 = 100 + Math.sin(i*Math.PI/180) * (isL ? 82 : 88), y1 = 100 - Math.cos(i*Math.PI/180) * (isL ? 82 : 88);
        let x2 = 100 + Math.sin(i*Math.PI/180) * 96, y2 = 100 - Math.cos(i*Math.PI/180) * 96;
        h += `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="#94a3b8" stroke-width="${isL?2:1}" />`;
        if(i % 90 === 0) h += `<text x="${100+Math.sin(i*Math.PI/180)*72}" y="${100-Math.cos(i*Math.PI/180)*72}" fill="white" font-size="14" font-weight="bold" text-anchor="middle" alignment-baseline="middle">${lbls[i]}</text>`;
    }
    svg.innerHTML = h;
}

function transfer() {
    if(!currentData) return;
    const s = document.getElementById('tab2Rwy'); s.innerHTML = "";
    for(let r in airportDB[currentData.id].rwys) { 
        let o = new Option("RWY " + r, r); 
        if(r === currentData.best) o.selected = true; 
        s.add(o); 
    }
    refreshTab2(); switchTab(2);
}

function refreshTab2() {
    const r = document.getElementById('tab2Rwy').value;
    const ap = airportDB[currentData.id];
    const magH = ap.rwys[r].mag;
    const rot = magH - 90;
    
    document.getElementById('rwyBar').style.transform = `translate(-50%, -50%) rotate(${rot}deg)`;
    const n1 = document.getElementById('n1'), n2 = document.getElementById('n2');
    n1.innerText = r; n2.innerText = (parseInt(r) > 18 ? parseInt(r)-18 : parseInt(r)+18).toString().padStart(2,'0');
    n1.style.transform = `rotate(${-rot}deg)`; n2.style.transform = `rotate(${-rot}deg)`;
    document.getElementById('windPtr').style.transform = `translate(-50%, -50%) rotate(${currentData.dir}deg)`;
    
    const legs = [{n:"Upwind",t:magH},{n:"Cross",t:(magH+270*(trafficSide==='L'?-1:1)+360)%360},{n:"Downwind",t:(magH+180)%360},{n:"Base",t:(magH+90*(trafficSide==='L'?-1:1)+360)%360}];
    let h = ""; legs.forEach(l => {
        const a = (currentData.dir - l.t) * Math.PI / 180, wca = Math.round(Math.asin((currentData.spd * Math.sin(a)) / 90) * 180 / Math.PI);
        h += `<tr style="border-bottom:1px solid #334151"><td style="padding:12px 8px">${l.n}</td><td align="center">${Math.round(l.t)}°</td><td align="center" style="color:var(--red)">${wca>0?'+':''}${wca}°</td><td align="right"><b>${((l.t+wca+360)%360).toString().padStart(3,'0')}°</b></td></tr>`;
    });
    document.getElementById('wcaList').innerHTML = h;

    // Table 3 導航頻率同步顯示
    const navTable = document.getElementById('navDataTable');
    const nav = (navDataDB[currentData.id] && navDataDB[currentData.id][r]) ? navDataDB[currentData.id][r] : null;
    if(nav) {
        navTable.innerHTML = `
            <tr><td>Ident</td><td align="right" class="val">${nav.ident}</td></tr>
            <tr><td>ILS Freq</td><td align="right" class="val">${nav.ils} MHz</td></tr>
            <tr><td>Course</td><td align="right" class="val">${nav.crs}°</td></tr>
            <tr><td>TACAN</td><td align="right" class="val">${nav.tacan}</td></tr>
        `;
    } else {
        navTable.innerHTML = `<tr><td colspan="2" align="center" style="padding:20px; color:var(--dim)">無導航資料</td></tr>`;
    }
    drawMapPattern(currentData.id, r);
}

function setSide(s) { trafficSide = s; document.getElementById('bL').className = s === 'L' ? 'active' : ''; document.getElementById('bR').className = s === 'R' ? 'active' : ''; refreshTab2(); }
function switchTab(n) { document.querySelectorAll('.tab-content, .tab-btn').forEach(el => el.classList.remove('active')); document.getElementById('tab' + n).classList.add('active'); document.querySelectorAll('.tab-btn')[n-1].classList.add('active'); if(n === 1) setTimeout(() => map.invalidateSize(), 300); }
window.onload = init;
</script>
</body>
</html>
