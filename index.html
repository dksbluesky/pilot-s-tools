<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">  
    <title>Pocket METAR Pro - Instructor Edition v2.8</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />  
    <link rel="apple-touch-icon" href="icon-180.png?v=3">
    <link rel="icon" sizes="192x192" href="icon-192.png?v=3">
    <link rel="manifest" href="manifest.json?v=3">
    <meta name="theme-color" content="#38bdf8">
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --text: #f8fafc; --dim: #94a3b8; --green: #4ade80; --red: #fb7185; --warn: #facc15; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; }
        .container { max-width: 650px; margin: 0 auto; }
        .tabs { display: flex; gap: 4px; margin-bottom: 12px; }
        .tab-btn { flex: 1; padding: 14px; background: #334155; border: none; color: white; border-radius: 8px 8px 0 0; cursor: pointer; opacity: 0.6; font-weight: bold; }
        .tab-btn.active { background: var(--card); border-bottom: 3px solid var(--accent); opacity: 1; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .card { background: var(--card); border-radius: 12px; padding: 16px; margin-bottom: 12px; box-shadow: 0 10px 15px rgba(0,0,0,0.3); }
        .label-sm { font-size: 0.7rem; color: var(--dim); text-transform: uppercase; font-weight: bold; margin-bottom: 8px; display: block; }
        .rwy-id { font-size: 3.5rem; font-weight: 900; line-height: 1; letter-spacing: -2px; }
        .raw-text { font-family: 'Consolas', monospace; color: var(--green); font-size: 0.85rem; line-height: 1.4; background: #000; padding: 10px; border-radius: 6px; border-left: 4px solid var(--green); margin-top: 8px; white-space: pre-wrap; word-break: break-all; }
        .compass-wrap { position: relative; width: 260px; height: 260px; margin: 15px auto; border-radius: 50%; background: #1a365d; border: 2px solid #334155; }
        .rwy-bar { position: absolute; top: 50%; left: 50%; width: 160px; height: 20px; background: #111; border: 1.5px solid #fff; transform: translate(-50%, -50%); z-index: 10; display: flex; justify-content: space-between; align-items: center; padding: 0 10px; border-radius: 3px; }
        .rwy-num { display: inline-block; color: white; font-size: 11px; font-weight: bold; font-family: monospace; }
        .wind-ptr { position: absolute; top: 50%; left: 50%; width: 0; height: 0; transform-origin: center center; z-index: 20; transition: transform 0.8s ease; }
        #map { height: 260px; border-radius: 12px; margin-top: 10px; background: #111; border: 1px solid #444; }
        .input-group { display: flex; gap: 8px; margin-bottom: 10px; }
        .input-group input { flex: 1; padding: 12px; background: #334155; color: white; border: none; border-radius: 8px; font-weight: bold; text-transform: uppercase; }
        .input-group button { padding: 0 20px; background: var(--accent); color: #000; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        select, .tas-input { width: 100%; padding: 14px; background: #334155; color: white; border: none; border-radius: 8px; font-size: 1rem; box-sizing: border-box; }
        .nav-table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        .nav-table td { padding: 10px 5px; border-bottom: 1px solid #334151; }
        .nav-table .val { color: var(--accent); font-weight: bold; font-family: 'Consolas', monospace; }
        .cloud-item { display: flex; justify-content: space-between; background: rgba(56, 189, 248, 0.1); padding: 8px 12px; border-radius: 8px; border-left: 4px solid var(--accent); margin-bottom: 4px; }
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 8px; }
        .info-item { background: rgba(0,0,0,0.2); padding: 10px; border-radius: 8px; border-left: 3px solid #475569; }
        .warn-text { color: var(--red) !important; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }
    </style>
</head>
<body>

<div class="container">
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab(1)">機場資訊</button>
        <button class="tab-btn" onclick="switchTab(2)">航線計算</button>
    </div>

    <div id="tab1" class="tab-content active">
        <div class="card">
            <span class="label-sm">ICAO 手動輸入 / 選取</span>
            <div class="input-group">
                <input type="text" id="icaoInput" placeholder="例如: RCTP" maxlength="4">
                <button onclick="manualUpdate()">查詢</button>
            </div>
            <select id="apSelect" onchange="document.getElementById('icaoInput').value=this.value; update()"></select>
        </div>
        <div class="card"><span class="label-sm">原始電碼 RAW DATA</span><div id="rawView" class="raw-text">數據庫載入中...</div></div>
        <div id="map"></div>
        <div class="card">
            <span class="label-sm">重點解譯 DECODER</span>
            <div class="info-grid">
                <div class="info-item"><span class="label-sm" style="margin:0">能見度 VIS</span><div id="visVal" style="font-weight:bold; font-size:1.1rem">--</div></div>
                <div class="info-item"><span class="label-sm" style="margin:0">氣壓 QNH</span><div id="qnhVal" style="font-weight:bold; font-size:1.1rem">--</div></div>
            </div>
            <div id="cloudBox" style="margin-top:8px"></div>
            <div id="rmkBox" style="margin-top:10px; font-size:0.85rem; color:var(--accent); white-space: pre-line;"></div>
        </div>
        <button onclick="transfer()" style="width:100%; padding:18px; background:var(--accent); color:#000; border:none; border-radius:12px; font-weight:bold; cursor:pointer; margin: 10px 0 30px 0;">傳送至計算頁面 ➔</button>
    </div>

    <div id="tab2" class="tab-content">
        <div class="card">
            <div style="display:flex; gap:10px; align-items: flex-end;">
                <div style="flex:2"><span class="label-sm">選取跑道</span><select id="tab2Rwy" onchange="refreshTab2()"></select></div>
                <div style="flex:1"><span class="label-sm">空速 TAS</span><input type="number" id="tasInput" class="tas-input" value="90" oninput="refreshTab2()"></div>
            </div>
            <div style="display:flex; gap:5px; margin-top:10px;">
                <button id="bL" style="flex:1; padding:10px; border-radius:5px; border:none; cursor:pointer;" onclick="setSide('L')">LEFT Traffic</button>
                <button id="bR" style="flex:1; padding:10px; border-radius:5px; border:none; cursor:pointer;" onclick="setSide('R')">RIGHT Traffic</button>
            </div>
        </div>
        <div class="card" style="text-align:center">
            <div class="compass-wrap">
                <svg width="260" height="260" viewBox="0 0 200 200" id="compSvg"></svg>
                <div id="rwyBar" class="rwy-bar"><span id="n1" class="rwy-num">--</span><span id="n2" class="rwy-num">--</span></div>
                <div id="windPtr" class="wind-ptr"><svg width="24" height="30" viewBox="0 0 24 30" style="position:absolute; top:-125px; left:-12px;"><path d="M12 30 L24 5 L12 12 L0 5 Z" fill="white" /></svg></div>
            </div>
        </div>
        <div class="card" style="padding:10px">
            <span class="label-sm">航線修正 WCA & GS</span>
            <table style="width:100%; font-size: 0.9rem; border-collapse: collapse; text-align: center;">
                <tbody id="wcaList"></tbody>
            </table>
        </div>
        <div class="card"><span class="label-sm">導航資料 NAV (ILS/TACAN)</span><table class="nav-table"><tbody id="navDataTable"></tbody></table></div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const airportDB = {
    "RCTP": { name: "桃園 Taoyuan", lat: 25.0797, lon: 121.2342, rwys: { "05L": {mag:52, true:48.8}, "05R": {mag:52, true:48.8}, "23L": {mag:232, true:228.8}, "23R": {mag:232, true:228.8} } },
    "RCSS": { name: "松山 Songshan", lat: 25.0697, lon: 121.5525, rwys: { "10": {mag:100, true:93.5}, "28": {mag:280, true:273.5} } },
    "RCKH": { name: "高雄 Kaohsiung", lat: 22.5771, lon: 120.3500, rwys: { "09": {mag:87, true:84.2}, "27": {mag:267, true:264.2} } },
    "RCMQ": { name: "台中 Taichung", lat: 24.2582, lon: 120.6203, rwys: { "18": {mag:180, true:175}, "36": {mag:360, true:355} } },
    "RCNN": { name: "台南 Tainan", lat: 22.9507, lon: 120.2058, rwys: { "18L": {mag:183, true:180}, "18R": {mag:180, true:176.5}, "36L": {mag:360, true:356.5}, "36R": {mag:3, true:0} } },
    "RCBS": { name: "金門 Kinmen", lat: 24.4297, lon: 118.3586, rwys: { "06": {mag:60, true:55}, "24": {mag:240, true:235} } },
    "RCQC": { name: "澎湖 Penghu", lat: 23.5681, lon: 119.6281, rwys: { "02": {mag:20, true:16.5}, "20": {mag:200, true:196.5} } },
    "VHHH": { name: "香港 Hong Kong", lat: 22.3089, lon: 113.9145, rwys: { "07L": {mag:76, true:74}, "07C": {mag:73, true:71}, "07R": {mag:73, true:70.9}, "25L": {mag:253, true:250.9}, "25C": {mag:253, true:251}, "25R": {mag:256, true:254} } },
    "VMMC": { name: "澳門 Macau", lat: 22.1495, lon: 113.5915, rwys: { "16": {mag:160, true:158}, "34": {mag:340, true:338} } },
    "WSSS": { name: "新加坡 Singapore", lat: 1.3644, lon: 103.9915, rwys: { "02L": {mag:23, true:23}, "02C": {mag:23, true:23}, "02R": {mag:23, true:23}, "20L": {mag:203, true:203}, "20C": {mag:203, true:203}, "20R": {mag:203, true:203} } },
    "RKSI": { name: "首爾仁川 Incheon", lat: 37.4602, lon: 126.4407, rwys: { "15L": {mag:153, true:145}, "15R": {mag:153, true:145}, "16L": {mag:153, true:145}, "16R": {mag:153, true:145}, "33L": {mag:333, true:325}, "33R": {mag:333, true:325}, "34L": {mag:333, true:325}, "34R": {mag:333, true:325} } },
    "RJTT": { name: "東京羽田 Haneda", lat: 35.5494, lon: 139.7798, rwys: { "04": {mag:42, true:35.1}, "05": {mag:64, true:57}, "16L": {mag:157, true:149.9}, "16R": {mag:157, true:149.9}, "22": {mag:222, true:215.1}, "23": {mag:230, true:223}, "34L": {mag:337, true:329.9}, "34R": {mag:337, true:329.9} } },
    "KJFK": { name: "紐約 JFK", lat: 40.6413, lon: -73.7781, rwys: { "04L": {mag:44, true:31}, "04R": {mag:44, true:30.6}, "13L": {mag:134, true:121}, "13R": {mag:134, true:121}, "22L": {mag:224, true:210.6}, "22R": {mag:224, true:211}, "31L": {mag:314, true:301}, "31R": {mag:314, true:301} } },
    "KLAX": { name: "洛杉磯 L.A.", lat: 33.9416, lon: -118.4085, rwys: { "06L": {mag:71, true:83}, "06R": {mag:71, true:83}, "07L": {mag:71, true:83}, "07R": {mag:71, true:83}, "24L": {mag:251, true:263}, "24R": {mag:251, true:263}, "25L": {mag:251, true:263}, "25R": {mag:251, true:263} } }
};

const groups = [
    { label: "🇹🇼 台灣 Taiwan", ids: ["RCTP", "RCSS", "RCKH", "RCMQ", "RCNN", "RCBS", "RCQC"] },
    { label: "🌏 亞太 Asia-Pacific", ids: ["VHHH", "VMMC", "WSSS", "RKSI", "RJTT"] },
    { label: "🇺🇸 歐美 Global", ids: ["KJFK", "KLAX"] }
];

let navDataDB = {}, csvVorCache = {}, currentData = null, trafficSide = 'L', map, marker, patternOverlay;

// 1. 強化型 MHz 轉 TACAN Channel
function mhzToTacan(mhz) {
    const f = parseFloat(mhz); if (isNaN(f)) return "";
    let ch = "";
    if (f >= 108.00 && f <= 111.95) ch = Math.round((f - 106.3) * 10) + "X";
    else if (f >= 112.30 && f <= 117.95) ch = Math.round((f - 105.3) * 10) + "X";
    return ch ? `(${ch})` : "";
}

// 2. Decoder 邏輯
const decodeMetarLogic = (raw) => {
    let d = [];
    if(raw.includes("NOSIG")) d.push("• NOSIG (天氣穩定)");
    if(raw.includes("CAVOK")) d.push("• CAVOK (能見/雲況良好)");
    if(raw.includes("TS")) d.push("• TS (雷暴風險)");
    if(raw.includes("WS")) d.push("• WS (風切預警)");
    if(raw.includes("RA")) d.push("• RA (降雨)");
    if(raw.includes("FG") || raw.includes("BR")) d.push("• FG/BR (低能見度)");
    return d.length > 0 ? d.join('\n') : "無顯著天氣現象";
};

// 3. 數據庫索引修正與讀取
async function ingestOurAirportsData() {
    try {
        const [rRes, nRes, dbRes] = await Promise.all([
            fetch('runways.csv'), fetch('navaids.csv'),
            fetch('database.json').catch(() => ({ ok: false }))
        ]);
        const rText = await rRes.text(), nText = await nRes.text();

        // Load ILS data from database.json
        const ilsDB = {};
        if (dbRes.ok) {
            const dbData = await dbRes.json();
            dbData.forEach(apt => { if (apt.ils_data) ilsDB[apt.code.toUpperCase()] = apt.ils_data; });
        }

        // Read Navaids
        const navMap = {};
        nText.split('\n').slice(1).forEach(line => {
            const c = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
            if (c.length < 20) return;
            const ident = c[2].replace(/"/g,''), type = c[4], freqRaw = parseFloat(c[5]), icao = c[19].toUpperCase().replace(/"/g,'').trim();
            const freq = (freqRaw > 500) ? (freqRaw / 1000).toFixed(2) : freqRaw.toFixed(2);
            if (!navMap[icao]) navMap[icao] = [];
            navMap[icao].push({ ident, type, freq });
        });

        // Best VOR per airport: VORTAC > VOR > TACAN
        const typeRank = t => t.includes('VORTAC') ? 3 : t.includes('VOR') ? 2 : 1;
        Object.keys(navMap).forEach(icao => {
            const vors = navMap[icao].filter(n => ['TACAN','VOR','VORTAC'].some(t => n.type.includes(t)));
            if (vors.length > 0) csvVorCache[icao] = vors.reduce((b, n) => typeRank(n.type) > typeRank(b.type) ? n : b);
        });

        // Read Runways
        rText.split('\n').slice(1).forEach(line => {
            const c = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
            if (c.length < 19) return;
            const icao = c[2].replace(/"/g,'').toUpperCase().trim();
            if (!navDataDB[icao]) navDataDB[icao] = {};
            [{id: c[8], hdg: c[12]}, {id: c[14], hdg: c[18]}].forEach(end => {
                const rId = end.id.replace(/"/g,'').trim(); if (!rId) return;
                const crs = end.hdg ? Math.round(parseFloat(end.hdg.replace(/"/g,''))).toString().padStart(3,'0') : rId.replace(/\D/g,'').padStart(2,'0')+'0';
                const aptIls = ilsDB[icao];
                const ils = aptIls ? (aptIls[rId] || aptIls[rId.replace(/\D/g,'')]) : null;
                navDataDB[icao][rId] = { ils: ils || null, crs };
            });
        });

        document.getElementById('rawView').innerText = "數據庫已就緒。";
    } catch (e) { document.getElementById('rawView').innerText = "加載錯誤"; }
}

function update() {
    const id = document.getElementById('icaoInput').value.toUpperCase(); if (!id) return;
    const ap = airportDB[id] || { name: id, lat: 25.07, lon: 121.23, rwys: {} };
    fetch(`https://metar.vatsim.net/metar.php?id=${id}&t=${Date.now()}`).then(r => r.text()).then(raw => {
        document.getElementById('rawView').innerText = raw.trim();
        
        // 風向
        const wMatch = raw.match(/(VRB|\d{3})(\d{2,3})(G\d{2,3})?KT/);
        let dir = 0, spd = 0; if (wMatch) { dir = wMatch[1]==="VRB"?0:parseInt(wMatch[1]); spd = parseInt(wMatch[2]); }
        
        // CAVOK 優先處理
        if (raw.includes("CAVOK")) {
            document.getElementById('visVal').innerText = "10km+ (CAVOK)";
        } else {
            const visMatch = raw.match(/\b\d{4}\b/);
            document.getElementById('visVal').innerText = visMatch ? (visMatch[0]==="9999"?"10km+":visMatch[0]+"m") : "N/A";
        }
        
        const qMatch = raw.match(/Q(\d{4})/);
        const aMatch = raw.match(/A(\d{4})/);
        document.getElementById('qnhVal').innerText = qMatch ? qMatch[1]+" hPa" : (aMatch ? (parseInt(aMatch[1])/100).toFixed(2)+" inHg" : "--");
        
        const cloudRegex = /(FEW|SCT|BKN|OVC|VV)(\d{3})/g;
        let cMatch, cloudsHtml = "";
        while ((cMatch = cloudRegex.exec(raw)) !== null) {
            cloudsHtml += `<div class="cloud-item"><span><b>${cMatch[1]}</b></span><span>${parseInt(cMatch[2])*100} ft</span></div>`;
        }
        document.getElementById('cloudBox').innerHTML = cloudsHtml || "Sky Clear / NSC";
        document.getElementById('rmkBox').innerText = decodeMetarLogic(raw);

        let best = "--", minD = 180;
        for(let r in ap.rwys) { let diff = Math.abs(dir-ap.rwys[r].mag); if(diff>180) diff=360-diff; if(diff<minD){minD=diff; best=r;} }
        currentData = { id, dir, spd, best };
        map.setView([ap.lat, ap.lon], 14); marker.setLatLng([ap.lat, ap.lon]);
        if(best !== "--") drawMapPattern(id, best);
    }).catch(() => {
        document.getElementById('rawView').innerText = "連線失敗。";
        const rwys = ap.rwys || {};
        currentData = { id, dir: 0, spd: 0, best: Object.keys(rwys)[0] || "--" };
        map.setView([ap.lat, ap.lon], 14); marker.setLatLng([ap.lat, ap.lon]);
    });
}

function refreshTab2() {
    if(!currentData) return; 
    const r = document.getElementById('tab2Rwy').value, ap = airportDB[currentData.id];
    const tas = parseInt(document.getElementById('tasInput').value) || 90;
    const magH = (ap && ap.rwys[r]) ? ap.rwys[r].mag : parseInt(r)*10;
    
    document.getElementById('rwyBar').style.transform = `translate(-50%, -50%) rotate(${magH-90}deg)`;
    const rNum = parseInt(r), rSfx = r.endsWith('L') ? 'R' : r.endsWith('R') ? 'L' : '';
    document.getElementById('n1').innerText = r;
    document.getElementById('n2').innerText = (rNum > 18 ? rNum - 18 : rNum + 18).toString().padStart(2,'0') + rSfx;
    document.getElementById('windPtr').style.transform = `translate(-50%, -50%) rotate(${currentData.dir}deg)`;
    
    const legs = [{n:"Upwind", t:magH}, {n:"Cross", t:(magH+(trafficSide==='L'?-90:90)+360)%360}, {n:"Downwind", t:(magH+180)%360}, {n:"Base", t:(magH+(trafficSide==='L'?90:-90)+360)%360}];
    let h = ""; legs.forEach(l => {
        const a = (currentData.dir - l.t) * Math.PI / 180;
        let wRad = Math.asin((currentData.spd * Math.sin(a)) / tas); if(isNaN(wRad)) wRad = 0;
        const wDeg = Math.round(wRad * 180 / Math.PI);
        const gs = Math.round(tas * Math.cos(wRad) + currentData.spd * Math.cos(a));
        h += `<tr><td align="left"><b>${l.n}</b></td><td>${Math.round(l.t)}°</td><td>${wDeg>=0?'+':''}${wDeg}°</td><td><b>${((Math.round(l.t)+wDeg+360)%360).toString().padStart(3,'0')}°</b></td><td align="right" style="color:var(--accent)">${gs}KT</td></tr>`;
    }); 
    document.getElementById('wcaList').innerHTML = h;

    const navEntry = navDataDB[currentData.id] && navDataDB[currentData.id][r] ? navDataDB[currentData.id][r] : null;
    const ils = navEntry ? navEntry.ils : null;
    const vor = csvVorCache[currentData.id];
    const crs = navEntry ? navEntry.crs : magH.toString().padStart(3,'0');
    let navHtml = ils
        ? `<tr><td>ILS</td><td align="right" class="val">${ils.ident} &nbsp; ${ils.freq} MHz <span style="color:var(--warn)">${mhzToTacan(ils.freq)}</span></td></tr>`
        : `<tr><td>ILS</td><td align="right" style="color:var(--warn)">No ILS — VOR/RNAV only</td></tr>`;
    if (vor) navHtml += `<tr><td>${vor.type}</td><td align="right" class="val">${vor.ident} &nbsp; ${vor.freq} MHz <span style="color:var(--warn)">${mhzToTacan(vor.freq)}</span></td></tr>`;
    navHtml += `<tr><td>Course</td><td align="right" class="val">${crs}°</td></tr>`;
    document.getElementById('navDataTable').innerHTML = navHtml;
    drawMapPattern(currentData.id, r || currentData.best);
}

function transfer() {
    if(!currentData) return; const s = document.getElementById('tab2Rwy'); s.innerHTML = "";
    const ap = airportDB[currentData.id]; if(ap) { for(let r in ap.rwys) { let o = new Option("RWY "+r, r); if(r===currentData.best) o.selected=true; s.add(o); } }
    refreshTab2(); switchTab(2);
}
function setSide(s) { trafficSide = s; document.getElementById('bL').style.background = s === 'L' ? 'var(--accent)' : '#334155'; document.getElementById('bR').style.background = s === 'R' ? 'var(--accent)' : '#334155'; refreshTab2(); }
function switchTab(n) { document.querySelectorAll('.tab-content, .tab-btn').forEach(el => el.classList.remove('active')); document.getElementById('tab' + n).classList.add('active'); document.querySelectorAll('.tab-btn')[n-1].classList.add('active'); if(n === 1) setTimeout(() => { map.invalidateSize(); if(currentData) { const r = document.getElementById('tab2Rwy').value || currentData.best; if(r) drawMapPattern(currentData.id, r); } }, 300); }
function manualUpdate() { update(); }

function drawMapPattern(id, rwy) {
    const ap = airportDB[id]; if(!ap || !ap.rwys[rwy]) return;
    const s = trafficSide === 'L' ? -1 : 1, tH = ap.rwys[rwy].true;
    const latF = 1 / 60, lonF = latF / Math.cos(ap.lat * Math.PI / 180);
    const toR = Math.PI / 180, rH = (90 - tH) * toR, rS = (90 - (tH + 90 * s)) * toR;
    const m = (p, a, d) => [p[0] + Math.sin(a) * d * latF, p[1] + Math.cos(a) * d * lonF];
    const p1 = m([ap.lat, ap.lon], rH, 1.5), p2 = m([ap.lat, ap.lon], rH, -1.5), p3 = m(p2, rS, 1.2), p4 = m(p1, rS, 1.2);
    patternOverlay.setLatLngs([p1, p4, p3, p2, p1]); // P0→P1→P2→P3→P4→P0 closed rectangle
}

function init() {
    ingestOurAirportsData();
    const sel = document.getElementById('apSelect');
    groups.forEach(g => {
        let grp = document.createElement('optgroup'); grp.label = g.label;
        g.ids.forEach(id => { if(airportDB[id]) grp.appendChild(new Option(`${id} - ${airportDB[id].name}`, id)); });
        sel.appendChild(grp);
    });
    sel.value = "RCSS"; document.getElementById('icaoInput').value = "RCSS";
    map = L.map('map', { zoomControl: false }).setView([25.0697, 121.5525], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    marker = L.marker([25.0697, 121.5525]).addTo(map);
    patternOverlay = L.polyline([], { color: '#38bdf8', weight: 3, dashArray: '10, 10' }).addTo(map);
    const svg = document.getElementById('compSvg'), lbls = { 0:'N', 90:'E', 180:'S', 270:'W' };
    let ticks = ''; for(let i=0; i<360; i+=10) {
        let isL = i % 30 === 0, x1 = 100 + Math.sin(i*Math.PI/180)*(isL?82:88), y1 = 100 - Math.cos(i*Math.PI/180)*(isL?82:88);
        let x2 = 100 + Math.sin(i*Math.PI/180)*96, y2 = 100 - Math.cos(i*Math.PI/180)*96;
        ticks += `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="#94a3b8" stroke-width="${isL?2:1}" />`;
        if(i % 90 === 0) ticks += `<text x="${100+Math.sin(i*Math.PI/180)*72}" y="${100-Math.cos(i*Math.PI/180)*72}" fill="white" font-size="14" font-weight="bold" text-anchor="middle">${lbls[i]}</text>`;
    } svg.innerHTML = ticks;
    setSide('L'); update();
}
window.onload = init;
</script>
